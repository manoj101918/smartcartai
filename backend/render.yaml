services:
  - type: web
    name: smartcart-api
    env: python
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="$HOME/.local/bin:$PATH" && uv sync --frozen --no-dev
    startCommand: .venv/bin/uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
      - key: SUPABASE_URL
      - key: SUPABASE_SERVICE_KEY
